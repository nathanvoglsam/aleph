[package]
name = "aleph-engine"
version = "0.1.0"
authors.workspace = true
description = "A Rust and Vulkan powered 3D game engine"
license.workspace = true
repository.workspace = true
documentation = "https://docs.rs/aleph-engine/"
keywords = ["engine", "graphics", "vulkan", "game"]
categories = ["game-engines"]
edition.workspace = true

[badges]
azure-devops = { project = "nathanvoglsam420/Aleph", pipeline = "nathanvoglsam.aleph", build = "1" }

[package.metadata.aleph]
configs = ["core", "rhi"]

[dependencies]
aleph-interfaces = { workspace = true }
aleph-target = { workspace = true }
aleph-sys-info = { workspace = true }
aleph-profile = { workspace = true }
aleph-config = { workspace = true }
aleph-identity-hasher = { workspace = true }
aleph-rhi-loader = { workspace = true }
aleph-rhi-api = { workspace = true }

log = { workspace = true }
once_cell = { workspace = true }
utf16_lit = { workspace = true }
raw-cpuid = { workspace = true }
num_cpus = { workspace = true }
serde = { workspace = true }
serde_json = { workspace = true }
crossbeam = { workspace = true }
rayon = { workspace = true }
sdl2 = { workspace = true }
sdl2-sys = { workspace = true }
ctrlc = { workspace = true }
parking_lot = { workspace = true }
raw-window-handle = { workspace = true }

[build-dependencies]
aleph-compile = { workspace = true }
aleph-target-build = { workspace = true }

[target.'cfg(windows)'.dependencies]
aleph-windows = { workspace = true }

[target.'cfg(target_os = "linux")'.dependencies]
libc = { workspace = true }

[target.'cfg(not(target_os = "android"))'.dependencies]
env_logger = { workspace = true }

[target.'cfg(target_os = "android")'.dependencies]
android_logger = { workspace = true }
