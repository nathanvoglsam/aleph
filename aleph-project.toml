[game]
# The name of the crate in the current workspace that implements the game entry point
crate_name = "aleph-test"

# The name of the game, as should appear as a pretty string like an app title
name = "Aleph Test"

# The name of the publisher/author of the game.
author = "Nathan Voglsam"

# The list of allowed platforms that the game is designed to target
# Current possible values: "windows", "macos", "linux", "android", "uwp"
target_platforms = ["windows", "macos", "linux", "android", "uwp"]

# Information needed to generate a valid UWP project/bundle
[uwp]
identity_name = "f50434c1-fbf7-422c-8525-8f908bff5778"
identity_publisher = "CN=F914AB1C-A8B5-465F-80AA-98480F374DC1"
certificate = ".aleph/certs/AlephCert.pfx"

# Information needed to generate a valid android project/bundle
[android]
app_id = "com.alephengine.alephtest.game"
version_id = 1

# Specification of app branding for Windows
[windows.branding]
icon = "game/branding/windows/app_icon.ico"

# Specification of app branding for UWP
[uwp.branding]
lock_screen_logo = "game/branding/uwp/LockScreenLogo.png"
splash_screen = "game/branding/uwp/SplashScreen.png"
square_44_x_44_logo = "game/branding/uwp/Square44x44Logo.png"
square_150_x_150_logo = "game/branding/uwp/Square150x150Logo.png"
store_logo = "game/branding/uwp/StoreLogo.png"
wide_310_x_150_logo = "game/branding/uwp/Wide310x150Logo.png"

# Specification of app branding for Android
[android.branding]
icon_mdpi = "game/branding/android/mipmap-mdpi/ic_launcher.png"
icon_hdpi = "game/branding/android/mipmap-hdpi/ic_launcher.png"
icon_xhdpi = "game/branding/android/mipmap-xhdpi/ic_launcher.png"
icon_xxhdpi = "game/branding/android/mipmap-xxhdpi/ic_launcher.png"
icon_xxxhdpi = "game/branding/android/mipmap-xxxhdpi/ic_launcher.png"
